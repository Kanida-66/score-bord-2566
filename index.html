<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volleyball Scoreboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body{
    background: linear-gradient(135deg,#ffcc99,#ff9966);
    min-height:100vh;
    padding:40px 20px;
}

/* หัวข้อหลัก */
.main-title{
    text-align:center;
    font-size:45px;
    margin-bottom:40px;
    color:#222;
    font-weight:bold;
}

/* container */
.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    gap:35px;
}

/* card */
.match-card{
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.match-card:hover{
    transform:translateY(-5px);
}

/* title */
.match-title{
    text-align:center;
    font-size:35px;
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    font-size:18px;
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#222;
    color:white;
    padding:16px;
    font-size:18px;
}

td{
    padding:20px;
    text-align:center;
    border-bottom:1px solid #ddd;
    font-size:20px;
}

/* team */
.team-name{
    font-weight:bold;
    color:#444;
}

/* score */
.score{
    font-size:45px;
    font-weight:bold;
    color:#ff5722;
    transition:0.2s;
}

/* buttons */
button{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.2s;
}

/* add button */
.add-btn{
    background:#4CAF50;
    color:white;
}

.add-btn:hover{
    background:#43a047;
    transform:scale(1.05);
}

/* remove button */
.remove-btn{
    background:#f44336;
    color:white;
}

.remove-btn:hover{
    background:#e53935;
    transform:scale(1.05);
}

/* modal */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
    animation:popup 0.3s ease;
}

@keyframes popup{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.modal-content h2{
    margin-bottom:20px;
    color:#222;
}

#winner{
    font-size:28px;
    margin-bottom:20px;
    color:#ff5722;
}

/* reset button */
.reset-btn{
    background:#2196F3;
    color:white;
}

.reset-btn:hover{
    background:#1976D2;
}

/* responsive */
@media(max-width:768px){

    .main-title{
        font-size:30px;
    }

    .match-title{
        font-size:25px;
    }

    table, thead, tbody, th, td, tr{
        display:block;
    }

    thead{
        display:none;
    }

    tr{
        background:#f9f9f9;
        margin-bottom:20px;
        border-radius:15px;
        padding:15px;
    }

    td{
        border:none;
        padding:10px;
    }

}

</style>
</head>

<body>

<h1 class="main-title">🏐 Volleyball Scoreboard</h1>

<div class="container">

    <!-- Match A B -->
    <div class="match-card">

        <div class="match-title">
            ทีม A VS ทีม B
        </div>

        <div class="subtitle">
            การแข่งขันวอลเลย์บอล 25 คะแนน
        </div>

        <table>

            <thead>
                <tr>
                    <th>ทีม</th>
                    <th>คะแนน</th>
                    <th>เพิ่มคะแนน</th>
                    <th>ลดคะแนน</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td class="team-name">ทีม A</td>

                    <td id="scoreA" class="score">0</td>

                    <td>
                        <button class="add-btn"
                        onclick="increaseScore('A')">
                            + คะแนน
                        </button>
                    </td>

                    <td>
                        <button class="remove-btn"
                        onclick="decreaseScore('A')">
                            - คะแนน
                        </button>
                    </td>
                </tr>

                <tr>
                    <td class="team-name">ทีม B</td>

                    <td id="scoreB" class="score">0</td>

                    <td>
                        <button class="add-btn"
                        onclick="increaseScore('B')">
                            + คะแนน
                        </button>
                    </td>

                    <td>
                        <button class="remove-btn"
                        onclick="decreaseScore('B')">
                            - คะแนน
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

    <!-- Match C D -->
    <div class="match-card">

        <div class="match-title">
            ทีม C VS ทีม D
        </div>

        <div class="subtitle">
            การแข่งขันวอลเลย์บอล 25 คะแนน
        </div>

        <table>

            <thead>
                <tr>
                    <th>ทีม</th>
                    <th>คะแนน</th>
                    <th>เพิ่มคะแนน</th>
                    <th>ลดคะแนน</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td class="team-name">ทีม C</td>

                    <td id="scoreC" class="score">0</td>

                    <td>
                        <button class="add-btn"
                        onclick="increaseScore('C')">
                            + คะแนน
                        </button>
                    </td>

                    <td>
                        <button class="remove-btn"
                        onclick="decreaseScore('C')">
                            - คะแนน
                        </button>
                    </td>
                </tr>

                <tr>
                    <td class="team-name">ทีม D</td>

                    <td id="scoreD" class="score">0</td>

                    <td>
                        <button class="add-btn"
                        onclick="increaseScore('D')">
                            + คะแนน
                        </button>
                    </td>

                    <td>
                        <button class="remove-btn"
                        onclick="decreaseScore('D')">
                            - คะแนน
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- modal -->
<div id="summaryModal" class="modal">

    <div class="modal-content">

        <h2>🏆 สรุปผลการแข่งขัน</h2>

        <h3 id="winner"></h3>

        <button class="reset-btn"
        onclick="resetScores()">
            เริ่มเกมใหม่
        </button>

    </div>

</div>

<script>

let intervalId = null;

window.onload = function(){

    const summaryModal =
    document.getElementById('summaryModal');

    const winner =
    document.getElementById('winner');

    winner.innerText = "พร้อมเริ่มการแข่งขัน";

    summaryModal.style.display = "flex";
}

/* เพิ่มคะแนน */
function increaseScore(team){

    const scoreElement =
    document.getElementById(`score${team}`);

    let currentScore =
    parseInt(scoreElement.innerText);

    currentScore++;

    scoreElement.innerText = currentScore;

    animateScore(scoreElement);

    /* ตรวจสอบชนะ */
    if(currentScore >= 25){

        const winner =
        document.getElementById('winner');

        winner.innerText =
        `🎉 ทีม ${team} ชนะการแข่งขัน`;

        showSummary();

        startResetTimer();
    }
}

/* ลดคะแนน */
function decreaseScore(team){

    const scoreElement =
    document.getElementById(`score${team}`);

    let currentScore =
    parseInt(scoreElement.innerText);

    currentScore--;

    if(currentScore < 0){
        currentScore = 0;
    }

    scoreElement.innerText = currentScore;

    animateScore(scoreElement);
}

/* animation score */
function animateScore(element){

    element.style.transform = "scale(1.3)";

    setTimeout(()=>{
        element.style.transform = "scale(1)";
    },150);
}

/* แสดง modal */
function showSummary(){

    const summaryModal =
    document.getElementById('summaryModal');

    summaryModal.style.display = 'flex';
}

/* reset timer */
function startResetTimer(){

    intervalId =
    setInterval(resetScores,3000);
}

/* reset scores */
function resetScores(){

    document.getElementById('scoreA').innerText = '0';
    document.getElementById('scoreB').innerText = '0';
    document.getElementById('scoreC').innerText = '0';
    document.getElementById('scoreD').innerText = '0';

    clearInterval(intervalId);

    const summaryModal =
    document.getElementById('summaryModal');

    summaryModal.style.display = 'none';
}

</script>

</body>
</html>
